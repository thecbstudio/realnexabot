<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexaBot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #0d0d0d;
  color: #f0f0f0;
  display: flex;
  flex-direction: column;
}
:root {
  --gold: #C9A84C;
  --gold-light: #E8C97A;
  --gold-dim: rgba(201,168,76,0.12);
  --surface: #161616;
  --surface-2: #1e1e1e;
  --border: #252525;
  --muted: #555;
  --dim: #888;
}

/* HEADER */
.chat-header {
  background: var(--surface);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--gold-dim);
  border: 1.5px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.15rem;
  flex-shrink: 0;
}
.header-info { flex: 1; min-width: 0; }
.bot-name {
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  font-size: 0.92rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bot-status {
  font-size: 0.72rem;
  color: #2ecc71;
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 2px;
}
.status-dot {
  width: 6px; height: 6px;
  background: #2ecc71;
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.powered { font-size: 0.62rem; color: #333; flex-shrink: 0; }

/* MESSAGES */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 2px; }
.messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

.msg { display: flex; flex-direction: column; max-width: 88%; }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; }
.bubble {
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 0.875rem;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg.bot .bubble {
  background: var(--surface-2);
  border-bottom-left-radius: 3px;
  border: 1px solid var(--border);
}
.msg.user .bubble {
  background: var(--gold);
  color: #000;
  font-weight: 500;
  border-bottom-right-radius: 3px;
}
.msg-time {
  font-size: 0.65rem;
  color: var(--muted);
  margin-top: 3px;
  padding: 0 2px;
}
.msg.user .msg-time { text-align: right; }

/* TYPING */
.typing-wrap { align-self: flex-start; }
.typing {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 12px 16px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  border-bottom-left-radius: 3px;
  width: fit-content;
}
.dot {
  width: 5px; height: 5px;
  background: #444;
  border-radius: 50%;
  animation: bounce 1.3s infinite;
}
.dot:nth-child(2) { animation-delay: .18s; }
.dot:nth-child(3) { animation-delay: .36s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

/* QUICK REPLIES */
.quick-replies {
  padding: 4px 14px 8px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.qr-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--dim);
  padding: 6px 13px;
  border-radius: 100px;
  font-size: 0.77rem;
  cursor: pointer;
  transition: all .18s;
  white-space: nowrap;
  font-family: 'DM Sans', sans-serif;
}
.qr-btn:hover { border-color: var(--gold); color: var(--gold); }

/* INPUT */
.input-area {
  padding: 10px 12px 12px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  background: var(--surface);
}
.chat-input {
  flex: 1;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: #f0f0f0;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 0.875rem;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color .2s;
  resize: none;
  max-height: 80px;
  min-height: 40px;
  line-height: 1.4;
}
.chat-input:focus { border-color: var(--gold); }
.chat-input::placeholder { color: #3a3a3a; }
.send-btn {
  background: var(--gold);
  color: #000;
  border: none;
  width: 40px; height: 40px;
  border-radius: 8px;
  cursor: pointer;
  transition: background .2s, transform .1s;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  align-self: flex-end;
}
.send-btn:hover { background: var(--gold-light); transform: scale(1.04); }
.send-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
</style>
</head>
<body>

<div class="chat-header">
  <div class="avatar" id="botAvatar">🤖</div>
  <div class="header-info">
    <div class="bot-name" id="botName">NexaBot</div>
    <div class="bot-status"><span class="status-dot"></span>Online</div>
  </div>
  <div class="powered">NexaBot</div>
</div>

<div class="messages" id="messages"></div>
<div class="quick-replies" id="quickReplies"></div>

<div class="input-area">
  <textarea class="chat-input" id="chatInput" rows="1" placeholder="Write a message..."></textarea>
  <button class="send-btn" id="sendBtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>

<script>
const businessId = window.location.pathname.split('/').filter(Boolean).pop();
// Her sayfa yüklenişinde yeni session başlat — her zaman güncel prompt kullanılsın
localStorage.removeItem('nxbt_sid_' + businessId);
let sessionId = null;
let isTyping  = false;
let business  = null;

async function loadBusiness() {
  if (!businessId || businessId === 'undefined') { initChat(); return; }
  try {
    const r = await fetch('/api/business/' + businessId);
    if (r.ok) {
      business = await r.json();
      document.getElementById('botName').textContent   = business.bot_name || business.name || 'NexaBot';
      document.getElementById('botAvatar').textContent = business.emoji || '🤖';
    }
  } catch(e) {}
  initChat();
}

function initChat() {
  appendMessage('bot', business?.greeting || '👋');
  showQuickReplies(business?.quick_replies || ['Hello!', 'Merhaba!', 'Hola!', 'Bonjour!']);
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function appendMessage(role, text) {
  const msgs = document.getElementById('messages');
  const now  = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const div  = document.createElement('div');
  div.className = 'msg ' + role;
  const formatted = esc(text).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  div.innerHTML = `<div class="bubble">${formatted}</div><div class="msg-time">${now}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const el   = document.createElement('div');
  el.className = 'typing-wrap'; el.id = 'typingEl';
  el.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingEl');
  if (el) el.remove();
}

function showQuickReplies(arr) {
  const qr = document.getElementById('quickReplies');
  qr.innerHTML = '';
  (arr || []).forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = r;
    btn.onclick = () => { qr.innerHTML = ''; sendText(r); };
    qr.appendChild(btn);
  });
}

async function sendText(text) {
  if (!text.trim() || isTyping) return;
  document.getElementById('quickReplies').innerHTML = '';
  appendMessage('user', text);
  isTyping = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      // Dil yok — backend Claude'a "kullanıcının dilinde cevap ver" diyecek
      body: JSON.stringify({ businessId, sessionId, message: text })
    });
    const data = await r.json();
    sessionId = data.sessionId;
    localStorage.setItem('nxbt_sid_' + businessId, sessionId);
    removeTyping();
    appendMessage('bot', data.reply);
    if (data.quickReplies && data.quickReplies.length) showQuickReplies(data.quickReplies);
  } catch(e) {
    removeTyping();
    appendMessage('bot', '⚠️ Connection error. Please try again.');
  }

  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('chatInput').focus();
}

document.getElementById('sendBtn').onclick = () => {
  const input = document.getElementById('chatInput');
  const text  = input.value.trim();
  if (text) { input.value = ''; resize(input); sendText(text); }
};

document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const text = e.target.value.trim();
    if (text) { e.target.value = ''; resize(e.target); sendText(text); }
  }
});

document.getElementById('chatInput').addEventListener('input', function() { resize(this); });

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}

loadBusiness();
</script>
</body>
</html>
